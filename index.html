<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      background: #08080a;
    }

    /* ── Background ── */
    #bg {
      position: fixed; inset: 0;
      background-color: #08080a;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
      transition: background-image 0.5s;
    }
    #bg::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.52);
    }
    #grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 1;
      transition: opacity 0.4s;
    }

    /* ── Layout ── */
    #layout {
      position: relative; z-index: 2;
      display: flex; height: 100vh; width: 100vw;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 210px; min-width: 210px;
      height: 100vh;
      background: rgba(8,8,12,0.78);
      border-right: 0.5px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex; flex-direction: column;
      padding: 0;
      transform: translateX(0);
      transition: transform 0.32s cubic-bezier(0.4,0,0.2,1),
                  width 0.32s cubic-bezier(0.4,0,0.2,1),
                  min-width 0.32s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
      flex-shrink: 0;
    }
    #sidebar.collapsed {
      transform: translateX(-210px);
      width: 0; min-width: 0;
    }

    .sb-inner {
      width: 210px;
      height: 100%;
      display: flex; flex-direction: column;
      padding: 1.5rem 0 1.5rem;
      overflow: hidden;
    }

    .sb-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem 1.2rem;
      border-bottom: 0.5px solid rgba(255,255,255,0.04);
      margin-bottom: 0.5rem;
    }
    .sb-title {
      font-size: 10px; letter-spacing: 0.24em;
      text-transform: uppercase; color: rgba(255,255,255,0.2);
    }
    .sb-close {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.2); padding: 2px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .sb-close:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.06); }

    .sb-section-label {
      font-size: 9px; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(255,255,255,0.15);
      padding: 0 1rem; margin: 1rem 0 0.4rem;
    }

    .mode-btn {
      display: flex; align-items: center; gap: 9px;
      width: 100%; padding: 8px 1rem;
      background: transparent; border: none;
      color: rgba(255,255,255,0.28);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      cursor: pointer; text-align: left;
      transition: color 0.15s, background 0.15s;
      position: relative; white-space: nowrap;
    }
    .mode-btn:hover { color: rgba(255,255,255,0.65); background: rgba(255,255,255,0.03); }
    .mode-btn.active { color: rgba(255,255,255,0.88); }
    .mode-btn.active::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 1.5px; background: rgba(140,130,255,0.7);
      border-radius: 0 2px 2px 0;
    }
    .mode-icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.6; }
    .mode-btn.active .mode-icon { opacity: 1; }

    .sb-divider {
      height: 0.5px; background: rgba(255,255,255,0.04);
      margin: 0.75rem 1rem;
    }

    .bg-drop {
      margin: 0 1rem; border: 0.5px dashed rgba(255,255,255,0.1);
      border-radius: 8px; padding: 14px 10px;
      text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .bg-drop:hover { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.02); }
    .bg-drop input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .bg-drop-icon { font-size: 18px; color: rgba(255,255,255,0.15); display: block; margin-bottom: 5px; }
    .bg-drop-text { font-size: 11px; color: rgba(255,255,255,0.2); line-height: 1.5; pointer-events: none; }

    .bg-clear {
      display: none; margin: 6px 1rem 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; padding: 6px 12px;
      border: 0.5px solid rgba(255,255,255,0.07);
      border-radius: 6px; background: transparent;
      color: rgba(255,255,255,0.22); cursor: pointer;
      width: calc(100% - 2rem);
      transition: color 0.15s, border-color 0.15s;
    }
    .bg-clear:hover { color: rgba(255,255,255,0.55); border-color: rgba(255,255,255,0.15); }

    .sb-spacer { flex: 1; }

    /* ── Toggle tab — always visible ── */
    #toggle-tab {
      position: fixed; left: 0; top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 20px; height: 48px;
      background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.07);
      border-left: none;
      border-radius: 0 6px 6px 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(8px);
      transition: background 0.15s, left 0.32s cubic-bezier(0.4,0,0.2,1);
    }
    #toggle-tab:hover { background: rgba(255,255,255,0.1); }
    #toggle-tab.open { left: 210px; }
    #toggle-tab svg { width: 10px; height: 10px; color: rgba(255,255,255,0.35); transition: transform 0.32s; }
    #toggle-tab.open svg { transform: rotate(180deg); }

    /* ── Main ── */
    #main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; position: relative;
      min-width: 0;
    }

    /* ── Controls bar ── */
    #controls-wrap {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 1.5rem 2rem 0;
      transition: opacity 0.35s, transform 0.35s;
      z-index: 5;
    }
    #controls-wrap.hidden {
      opacity: 0; pointer-events: none;
      transform: translateY(-8px);
    }

    .controls {
      display: flex; gap: 8px;
      align-items: center; justify-content: center; flex-wrap: wrap;
    }

    input[type="text"], input[type="date"] {
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 9px 14px;
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #d8d8e8; outline: none;
      transition: border-color 0.2s, background 0.2s;
      color-scheme: dark; backdrop-filter: blur(6px);
    }
    input[type="text"] { width: 200px; }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.18); }
    input:focus { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.07); }

    .btn-row { display: flex; gap: 6px; }

    .start-btn, .clear-btn {
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      font-weight: 500; letter-spacing: 0.06em;
      border-radius: 8px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .start-btn {
      padding: 9px 22px;
      border: 0.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #c0c0d8; backdrop-filter: blur(6px);
    }
    .start-btn:hover { background: rgba(255,255,255,0.1); }
    .start-btn:active { transform: scale(0.97); }
    .clear-btn {
      padding: 9px 13px;
      border: 0.5px solid rgba(255,255,255,0.05);
      background: transparent; color: rgba(255,255,255,0.2);
    }
    .clear-btn:hover { color: rgba(255,255,255,0.55); }
    .clear-btn:active { transform: scale(0.97); }

    /* ── Hide controls toggle ── */
    #hide-btn {
      margin-top: 10px;
      background: none; border: none; cursor: pointer;
      font-size: 10px; letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.14);
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 5px;
      padding: 4px 8px; border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    #hide-btn:hover { color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.04); }

    /* ── Show controls ghost (visible only when controls hidden) ── */
    #show-btn {
      position: absolute; top: 14px; right: 18px;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.12); z-index: 5;
      font-size: 10px; letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      padding: 5px 10px;
      border-radius: 6px;
      border: 0.5px solid transparent;
      display: none;
      transition: color 0.2s, border-color 0.2s, background 0.15s;
    }
    #show-btn:hover {
      color: rgba(255,255,255,0.5);
      border-color: rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
    }
    #show-btn.visible { display: block; }

    /* ── Countdown display ── */
    .event-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 50px);
      font-weight: 300; color: #f0f0fa;
      letter-spacing: 0.04em; text-align: center;
      min-height: 52px; line-height: 1.15;
      margin-bottom: 1rem;
      text-shadow: 0 2px 24px rgba(0,0,0,0.5);
    }

    .thin-rule {
      width: 32px; height: 0.5px;
      background: rgba(255,255,255,0.1);
      margin-bottom: 2rem;
    }

    .mode-label {
      font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      margin-bottom: 1.2rem; text-align: center; min-height: 14px;
    }

    .tiles {
      display: flex; justify-content: center;
      align-items: flex-start; margin-bottom: 2rem;
    }
    .tile {
      display: flex; flex-direction: column;
      align-items: center;
      padding: 0 clamp(0.75rem, 2.5vw, 2rem);
      position: relative;
    }
    .tile + .tile::before {
      content: ''; position: absolute; left: 0;
      top: 6px; bottom: 20px; width: 0.5px;
      background: rgba(255,255,255,0.06);
    }
    .tile-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 8.5vw, 96px);
      font-weight: 300; color: #efefff;
      line-height: 1; min-width: 1.2ch;
      text-align: center; letter-spacing: -0.02em;
      transition: opacity 0.08s;
      text-shadow: 0 2px 30px rgba(0,0,0,0.4);
    }
    .tile-num.flash { opacity: 0.15; }
    .tile-label {
      font-size: 9px; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(255,255,255,0.18);
      margin-top: 10px; font-weight: 500;
    }

    .single-stat {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(80px, 14vw, 150px);
      font-weight: 300; color: #efefff;
      line-height: 1; text-align: center;
      letter-spacing: -0.02em;
      text-shadow: 0 4px 40px rgba(0,0,0,0.4);
      margin-bottom: 1.5rem;
    }
    .single-unit {
      font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(255,255,255,0.18);
      text-align: center; margin-bottom: 2rem;
    }

    .progress-wrap {
      width: min(360px, 65vw); height: 1px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px; overflow: hidden; margin-bottom: 1.25rem;
    }
    .progress-fill {
      height: 100%; background: rgba(255,255,255,0.2);
      border-radius: 2px; transition: width 1s linear;
    }

    .date-line {
      font-size: 11px; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.16); text-align: center; min-height: 16px;
    }

    .done-msg {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 300; color: #f0f0fa;
      letter-spacing: 0.05em; text-align: center; margin-bottom: 2rem;
    }

    .empty {
      font-size: 13px; color: rgba(255,255,255,0.12);
      letter-spacing: 0.06em; text-align: center; margin-bottom: 2rem;
    }

    .saved-badge {
      font-size: 10px; letter-spacing: 0.14em;
      color: rgba(255,255,255,0.14); text-align: center;
      margin-top: 0.75rem; opacity: 0; transition: opacity 0.4s;
    }
    .saved-badge.show { opacity: 1; }

    .corner { position: fixed; width: 20px; height: 20px; opacity: 0.1; z-index: 3; }
    .corner-tr { top: 20px; right: 20px; border-top: 0.5px solid #fff; border-right: 0.5px solid #fff; }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 0.5px solid #fff; border-right: 0.5px solid #fff; }

    /* ── Fullscreen button ── */
    #fs-btn {
      position: fixed; bottom: 18px; right: 18px;
      z-index: 10; background: rgba(255,255,255,0.05);
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 8px; width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(8px);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      color: rgba(255,255,255,0.3);
    }
    #fs-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.16); color: rgba(255,255,255,0.7); }
    #fs-btn:active { transform: scale(0.94); }
    #fs-btn svg { width: 14px; height: 14px; }
  </style>
</head>
<body>

<div id="bg"></div>
<div id="grid"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-br"></div>

<!-- Fullscreen button -->
<button id="fs-btn" onclick="toggleFullscreen()" title="Toggle fullscreen">
  <svg id="fs-icon-enter" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="1,5 1,1 5,1"/><polyline points="9,1 13,1 13,5"/>
    <polyline points="13,9 13,13 9,13"/><polyline points="5,13 1,13 1,9"/>
  </svg>
  <svg id="fs-icon-exit" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
    <polyline points="5,1 1,1 1,5"/><polyline points="13,5 13,1 9,1"/>
    <polyline points="9,13 13,13 13,9"/><polyline points="1,9 1,13 5,13"/>
  </svg>
</button>

<!-- Sidebar toggle tab -->
<div id="toggle-tab" onclick="toggleSidebar()">
  <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <polyline points="6,2 3,5 6,8"/>
  </svg>
</div>

<div id="layout">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sb-inner">
      <div class="sb-top">
        <span class="sb-title">Settings</span>
        <button class="sb-close" onclick="toggleSidebar()" title="Close">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/>
          </svg>
        </button>
      </div>

      <span class="sb-section-label">View mode</span>

      <button class="mode-btn active" data-mode="full" onclick="setMode('full')">
        <svg class="mode-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1" y="2" width="12" height="10" rx="1.5"/>
          <line x1="4.5" y1="2" x2="4.5" y2="12"/>
          <line x1="9.5" y1="2" x2="9.5" y2="12"/>
        </svg>
        Full countdown
      </button>

      <button class="mode-btn" data-mode="days" onclick="setMode('days')">
        <svg class="mode-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1" y="1" width="12" height="12" rx="1.5"/>
          <line x1="1" y1="5" x2="13" y2="5"/>
          <line x1="5" y1="1" x2="5" y2="5"/>
          <line x1="9" y1="1" x2="9" y2="5"/>
        </svg>
        Days until
      </button>

      <button class="mode-btn" data-mode="weeks" onclick="setMode('weeks')">
        <svg class="mode-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1" y="1" width="12" height="12" rx="1.5"/>
          <line x1="1" y1="5" x2="13" y2="5"/>
          <line x1="7" y1="5" x2="7" y2="13"/>
        </svg>
        Weeks until
      </button>

      <button class="mode-btn" data-mode="weekdays" onclick="setMode('weekdays')">
        <svg class="mode-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="1" y="2" width="12" height="10" rx="1.5"/>
          <line x1="3.5" y1="6" x2="3.5" y2="9"/>
          <line x1="6" y1="6" x2="6" y2="9"/>
          <line x1="8.5" y1="6" x2="8.5" y2="9"/>
          <line x1="11" y1="6" x2="11" y2="9"/>
        </svg>
        Weekdays until
      </button>

      <button class="mode-btn" data-mode="weekends" onclick="setMode('weekends')">
        <svg class="mode-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="7" cy="8" r="3.5"/>
          <line x1="7" y1="1.5" x2="7" y2="4.5"/>
          <line x1="3" y1="3" x2="4.5" y2="4.5"/>
          <line x1="11" y1="3" x2="9.5" y2="4.5"/>
        </svg>
        Weekends until
      </button>

      <div class="sb-divider"></div>
      <span class="sb-section-label">Precise time</span>

      <button class="mode-btn" data-mode="hours" onclick="setMode('hours')">
        <svg class="mode-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="7" cy="7" r="5.5"/>
          <line x1="7" y1="7" x2="7" y2="3.5"/>
          <line x1="7" y1="7" x2="9.5" y2="8.5"/>
        </svg>
        Hours until
      </button>

      <button class="mode-btn" data-mode="minutes" onclick="setMode('minutes')">
        <svg class="mode-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="7" cy="7" r="5.5"/>
          <line x1="7" y1="7" x2="7" y2="3.5"/>
          <line x1="7" y1="7" x2="10" y2="7"/>
        </svg>
        Minutes until
      </button>

      <button class="mode-btn" data-mode="seconds" onclick="setMode('seconds')">
        <svg class="mode-icon" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="7" cy="7" r="5.5"/>
          <line x1="7" y1="7" x2="9" y2="4"/>
          <circle cx="7" cy="7" r="1" fill="currentColor" stroke="none"/>
        </svg>
        Seconds until
      </button>

      <div class="sb-divider"></div>
      <span class="sb-section-label">Background</span>

      <div class="bg-drop" id="bgDrop">
        <input type="file" accept="image/*" onchange="loadBg(event)" />
        <span class="bg-drop-icon">↑</span>
        <span class="bg-drop-text">Click or drop an image</span>
      </div>
      <button class="bg-clear" id="bgClear" onclick="clearBg()">Remove image</button>

      <div class="sb-spacer"></div>
    </div>
  </nav>

  <!-- Main -->
  <main id="main">

    <!-- Controls (hideable) -->
    <div id="controls-wrap">
      <div class="controls">
        <input type="text" id="eName" placeholder="Event name..." maxlength="48" />
        <input type="date" id="eDate" />
        <div class="btn-row">
          <button class="start-btn" onclick="start()">Start</button>
          <button class="clear-btn" onclick="clearSaved()" title="Clear">✕</button>
        </div>
      </div>
      <button id="hide-btn" onclick="hideControls()">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <line x1="1" y1="7" x2="5" y2="3"/><line x1="5" y1="3" x2="9" y2="7"/>
        </svg>
        Hide
      </button>
    </div>

    <!-- Ghost show button -->
    <button id="show-btn" onclick="showControls()">Show controls</button>

    <!-- Countdown display -->
    <div id="eventLabel" class="event-name"></div>
    <div id="rule" class="thin-rule" style="display:none;"></div>
    <p class="mode-label" id="modeLabel"></p>

    <div id="display">
      <p class="empty">Enter an event and pick a date to begin.</p>
    </div>

    <div id="progressWrap" class="progress-wrap" style="display:none;">
      <div id="progressFill" class="progress-fill" style="width:0%"></div>
    </div>

    <p class="date-line" id="dateLine"></p>
    <p class="saved-badge" id="savedBadge">saved</p>
  </main>
</div>

<script>
  let iv = null, target = null, startMs = null;
  let currentMode = localStorage.getItem('cd_mode') || 'full';
  let sidebarOpen = localStorage.getItem('cd_sidebar') !== 'closed';
  let controlsVisible = localStorage.getItem('cd_controls') !== 'hidden';

  // Min date
  const today = new Date();
  document.getElementById('eDate').min =
    `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  function pad(n) { return String(n).padStart(2, '0'); }

  // ── Sidebar ──
  function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    localStorage.setItem('cd_sidebar', sidebarOpen ? 'open' : 'closed');
    applysidebar();
  }
  function applysidebar() {
    const sb = document.getElementById('sidebar');
    const tab = document.getElementById('toggle-tab');
    sb.classList.toggle('collapsed', !sidebarOpen);
    tab.classList.toggle('open', sidebarOpen);
  }

  // ── Controls ──
  function hideControls() {
    controlsVisible = false;
    localStorage.setItem('cd_controls', 'hidden');
    applyControls();
  }
  function showControls() {
    controlsVisible = true;
    localStorage.setItem('cd_controls', 'visible');
    applyControls();
  }
  function applyControls() {
    document.getElementById('controls-wrap').classList.toggle('hidden', !controlsVisible);
    const showBtn = document.getElementById('show-btn');
    showBtn.classList.toggle('visible', !controlsVisible);
  }

  // ── Mode ──
  function setMode(mode) {
    currentMode = mode;
    localStorage.setItem('cd_mode', mode);
    document.querySelectorAll('.mode-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === mode));
    renderDisplay();
  }

  // ── Background ──
  function loadBg(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('bg').style.backgroundImage = `url(${ev.target.result})`;
      document.getElementById('grid').style.opacity = '0.4';
      try { localStorage.setItem('cd_bg', ev.target.result); } catch(err) {}
      document.getElementById('bgClear').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
  function clearBg() {
    document.getElementById('bg').style.backgroundImage = 'none';
    document.getElementById('grid').style.opacity = '1';
    localStorage.removeItem('cd_bg');
    document.getElementById('bgClear').style.display = 'none';
    document.querySelector('#bgDrop input').value = '';
  }

  // ── Math ──
  function getDays() {
    const n = new Date(); const nd = new Date(n.getFullYear(), n.getMonth(), n.getDate());
    return Math.ceil((target - nd) / 86400000);
  }
  function getWeeks() { return Math.ceil(getDays() / 7); }
  function getWeekdays() {
    const n = new Date();
    let cur = new Date(n.getFullYear(), n.getMonth(), n.getDate());
    const end = new Date(target.getFullYear(), target.getMonth(), target.getDate());
    let c = 0;
    while (cur < end) { const d = cur.getDay(); if (d && d < 6) c++; cur.setDate(cur.getDate()+1); }
    return c;
  }
  function getWeekends() {
    const n = new Date();
    let cur = new Date(n.getFullYear(), n.getMonth(), n.getDate());
    const end = new Date(target.getFullYear(), target.getMonth(), target.getDate());
    let c = 0;
    while (cur < end) { const d = cur.getDay(); if (d===0||d===6) c++; cur.setDate(cur.getDate()+1); }
    return c;
  }
  function getTotalHours()   { return Math.ceil((target - new Date()) / 3600000); }
  function getTotalMinutes() { return Math.ceil((target - new Date()) / 60000); }
  function getTotalSeconds() { return Math.ceil((target - new Date()) / 1000); }

  // ── Render ──
  function renderDisplay() {
    if (!target) return;
    const now = new Date();
    const nowDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const diff = target - nowDay;
    const display = document.getElementById('display');
    const dateLine = document.getElementById('dateLine');
    const modeLabel = document.getElementById('modeLabel');

    if (diff < 0) {
      display.innerHTML = '<p class="done-msg">That day has passed.</p>';
      dateLine.textContent = ''; modeLabel.textContent = '';
      document.getElementById('progressWrap').style.display = 'none';
      clearInterval(iv); return;
    }
    if (diff === 0) {
      display.innerHTML = '<p class="done-msg">Today is the day.</p>';
      dateLine.textContent = ''; modeLabel.textContent = '';
      document.getElementById('progressFill').style.width = '100%';
      clearInterval(iv); return;
    }

    const totalSecs = Math.floor((target - now) / 1000);
    const days = Math.floor(totalSecs / 86400);
    const hrs  = Math.floor((totalSecs % 86400) / 3600);
    const mins = Math.floor((totalSecs % 3600) / 60);
    const secs = totalSecs % 60;

    const pct = Math.min(100, Math.round(((Date.now()-startMs)/(target-startMs))*100));
    document.getElementById('progressFill').style.width = pct + '%';

    const modeLabels = { full:'', days:'days remaining', weeks:'weeks remaining', weekdays:'weekdays remaining', weekends:'weekend days remaining', hours:'hours remaining', minutes:'minutes remaining', seconds:'seconds remaining' };
    modeLabel.textContent = modeLabels[currentMode] || '';

    if (currentMode === 'full') {
      display.innerHTML = `
        <div class="tiles">
          <div class="tile"><span class="tile-num" id="n-d">${days}</span><span class="tile-label">days</span></div>
          <div class="tile"><span class="tile-num" id="n-h">${pad(hrs)}</span><span class="tile-label">hours</span></div>
          <div class="tile"><span class="tile-num" id="n-m">${pad(mins)}</span><span class="tile-label">minutes</span></div>
          <div class="tile"><span class="tile-num" id="n-s">${pad(secs)}</span><span class="tile-label">seconds</span></div>
        </div>`;
      const el = document.getElementById('n-s');
      if (el) { el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'), 80); }
    } else {
      const vals = {
        days:     [getDays(),         'day',          'days'],
        weeks:    [getWeeks(),         'week',         'weeks'],
        weekdays: [getWeekdays(),      'weekday',      'weekdays'],
        weekends: [getWeekends(),      'weekend day',  'weekend days'],
        hours:    [getTotalHours(),    'hour',         'hours'],
        minutes:  [getTotalMinutes(),  'minute',       'minutes'],
        seconds:  [getTotalSeconds(),  'second',       'seconds'],
      };
      const [val, sing, plur] = vals[currentMode];
      const formatted = val.toLocaleString();
      display.innerHTML = `<div class="single-stat">${formatted}</div><p class="single-unit">${val===1?sing:plur}</p>`;
    }

    dateLine.textContent = target.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }

  // ── Start ──
  function start() {
    const dv = document.getElementById('eDate').value;
    const nv = document.getElementById('eName').value.trim();
    if (!dv) { document.getElementById('dateLine').textContent = 'Please pick a date.'; return; }
    if (iv) clearInterval(iv);
    const [y,m,d] = dv.split('-').map(Number);
    target = new Date(y, m-1, d);
    startMs = Date.now();
    localStorage.setItem('cd_name', nv);
    localStorage.setItem('cd_date', dv);
    localStorage.setItem('cd_start', String(startMs));
    const badge = document.getElementById('savedBadge');
    badge.classList.add('show');
    setTimeout(()=>badge.classList.remove('show'), 1800);
    document.getElementById('eventLabel').textContent = nv || 'your event';
    document.getElementById('rule').style.display = 'block';
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('dateLine').textContent = '';
    renderDisplay();
    iv = setInterval(renderDisplay, 1000);
  }

  // ── Clear ──
  function clearSaved() {
    ['cd_name','cd_date','cd_start'].forEach(k=>localStorage.removeItem(k));
    if (iv) clearInterval(iv);
    iv = null; target = null; startMs = null;
    document.getElementById('eName').value = '';
    document.getElementById('eDate').value = '';
    document.getElementById('eventLabel').textContent = '';
    document.getElementById('rule').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('dateLine').textContent = '';
    document.getElementById('modeLabel').textContent = '';
    document.getElementById('display').innerHTML = '<p class="empty">Enter an event and pick a date to begin.</p>';
  }

  // ── Init ──
  (function init() {
    // Restore bg
    try {
      const bg = localStorage.getItem('cd_bg');
      if (bg) {
        document.getElementById('bg').style.backgroundImage = `url(${bg})`;
        document.getElementById('grid').style.opacity = '0.4';
        document.getElementById('bgClear').style.display = 'block';
      }
    } catch(e) {}

    applyControls();
    applysidebar();
    setMode(currentMode);

    const savedDate = localStorage.getItem('cd_date');
    const savedName = localStorage.getItem('cd_name');
    const savedStart = localStorage.getItem('cd_start');
    if (!savedDate) return;

    document.getElementById('eName').value = savedName || '';
    document.getElementById('eDate').value = savedDate;
    const [y,m,d] = savedDate.split('-').map(Number);
    target = new Date(y, m-1, d);
    startMs = savedStart ? parseInt(savedStart) : Date.now();
    document.getElementById('eventLabel').textContent = savedName || 'your event';
    document.getElementById('rule').style.display = 'block';
    document.getElementById('progressWrap').style.display = 'block';
    renderDisplay();
    iv = setInterval(renderDisplay, 1000);
  })();

  // ── Fullscreen ──
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  }

  document.addEventListener('fullscreenchange', () => {
    const isFs = !!document.fullscreenElement;
    document.getElementById('fs-icon-enter').style.display = isFs ? 'none' : 'block';
    document.getElementById('fs-icon-exit').style.display  = isFs ? 'block' : 'none';
  });
</script>
</body>
</html>
